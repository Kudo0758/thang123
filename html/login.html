<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng kí</title>
    <link rel="stylesheet" href="../css/style1.css">
</head>
<body>  
    <div class="container">
        <div class="login-container mx-auto">
            <h2 class="login-title">Đăng kí</h2>
            <form action="/login" method="POST">
			
                <div class="form-group">
                    <label for="username">Tên đăng kí</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
				
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
				
				<div class="form-group">
                    <label for="number">số điện thoại</label>
                    <input type="text" class="form-control" id="address" name="address" required>
                </div>
				
				<div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text" class="form-control" id="address" name="address" required>
                </div>
				
				<div class="form-group">
                    <label for="birthday">Ngày tháng năm sinh</label>
                    <input type="date" class="form-control" id="birthday" name="birthday" required>
                </div>
				
				<div class="form-group gender-group">
					<label>Giới tính</label>

				<div class="gender-options">
					<label><input type="radio" name="gender" value="Nam">Nam</label>
					<label><input type="radio" name="gender" value="Nữ">Nữ</label>
					<label><input type="radio" name="gender" value="Khác">Khác</label>
					<input type="text" 
						     class="other-gender"
						     placeholder="Nhập giới tính">
				</div>
				</div>
				
				<div class="form-group">
                    <label for="email">Gmail</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Đăng kí</button>
				<button type="reset" class="btn btn-secondary btn-block">Cancel</button>
            </form>
        </div>
    </div>
</body>
</html>
